<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22/%3E">
<title>slide-5</title></head><body>
<style>
  :root{
    --bg:#f8f7ef;
    --ink:#111;
    --grid:#d9d9d0;
    --blue:#1f4f9a;
    --orange:#e67e22;
    --red:#d32f2f;
    --green:#2f8d51;
    --purple:#8e44ad;
    --panel:#ffffff;
    --line:#222;
    --muted:#666;
  }
  .excalidraw-stage {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      var(--bg);
    background-size:24px 24px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans TC", "Microsoft JhengHei", monospace;
    color:var(--ink);
    z-index: 50;
  }
  .topbar{
    position: absolute; top: 0; left: 0; width: 100%;
    height:26px; display:grid; grid-template-columns: 1fr 410px;
    border-bottom:2px solid #222; font-size:14px; letter-spacing:.5px; background:rgba(255,255,255,.42);
  }
  .topbar div{padding:4px 10px; border-right:2px solid #222;}
  .topbar div:last-child{border-right:0}
  
  .main-frame{
    position:absolute; left:150px; top:100px; width:1540px; height:680px;
    background:rgba(255,255,255,.86); border:3px solid var(--purple); box-shadow:0 0 0 2px rgba(142,68,173,.18);
  }
  .main-frame:before, .main-frame:after{
    content:""; position:absolute; width:13px;height:13px; border:3px solid var(--purple); background:var(--bg);
  }
  .main-frame:before{left:-13px; top:-13px}
  .main-frame:after{right:-13px; bottom:-13px}
  
  .tag{
    display:inline-block; background:var(--purple); color:white; padding:18px 24px;
    font-weight:800; font-size:24px; margin:36px 0 0 30px; letter-spacing:1px; transform:skewX(-8deg);
  }
  .title{
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-size:80px; font-weight:950; line-height:1; margin:40px 80px 0; letter-spacing:2px;
  }
  
  .timeline-container {
    margin: 80px 80px 0;
    position: relative;
    height: 250px;
  }
  
  .timeline-line {
    position: absolute; top: 50%; left: 0; right: 0; height: 6px;
    background: #222; transform: translateY(-50%);
  }
  
  .timeline-nodes {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  
  .node-group {
    position: relative; width: 80px; height: 80px;
    display: flex; justify-content: center; align-items: center;
    opacity: 0; transform: translateY(-20px);
  }
  
  .node-circle {
    width: 60px; height: 60px; border-radius: 50%;
    background: #fff; border: 5px solid var(--purple);
    display: flex; justify-content: center; align-items: center;
    font-size: 32px; font-weight: 900; z-index: 2;
    box-shadow: 4px 4px 0 rgba(142,68,173,0.3);
  }
  
  .node-label {
    position: absolute; top: 100px; width: 250px; text-align: center;
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-weight: bold; font-size: 26px;
  }
  
  .node-label.top {
    top: -80px;
  }

  .status{
    position:absolute; right:80px; bottom:80px; font-size:22px; font-weight:800;
    background:rgba(255,255,255,.7); padding:4px 10px; color: var(--purple);
  }
  .progress-box{
    position:absolute; left:80px; right:80px; bottom:30px; height:30px;
    border:3px solid #222; background:#fff;
  }
  .progress-fill{
    height:100%; width:0%; background:var(--purple); transform-origin:left center;
  }

  .footer{
    position:absolute; left:0;right:0;bottom:0; height:50px; border-top:4px solid #222;
    display:grid; grid-template-columns: 450px 400px 380px 250px 1fr;
    background:rgba(255,255,255,.76); font-size:20px; font-weight:800;
  }
  .footer div{border-right:3px solid #222; padding:12px 20px}
  .footer div:last-child{border-right:0}
</style>

<div data-hf-scene="excalidrawStage" data-hf-start="0" data-hf-end="1260" class="excalidraw-stage" id="excalidrawStage">
  <div class="topbar">
    <div>MODULE: INTRODUCTION [V2.0]</div>
    <div>STATUS: SYSTEM_READY | TYPE: CONTEXT_EXPANSION</div>
  </div>

  <div class="main-frame">
    <div class="tag">// INTRODUCTION MODULE</div>
    <h1 class="title" id="titleText">模組簡介：邏輯節點 G - L</h1>
    
    <div class="timeline-container">
      <div class="timeline-line"></div>
      <div class="timeline-nodes">
        <div class="node-group" id="node-G">
          <div class="node-circle">G</div>
          <div class="node-label">大趨勢背景</div>
        </div>
        <div class="node-group" id="node-H">
          <div class="node-circle">H</div>
          <div class="node-label top">特定難題挑戰</div>
        </div>
        <div class="node-group" id="node-IJ">
          <div class="node-circle">I/J</div>
          <div class="node-label">文獻與優缺點評論</div>
        </div>
        <div class="node-group" id="node-K">
          <div class="node-circle">K</div>
          <div class="node-label top">亮點與創新性</div>
        </div>
        <div class="node-group" id="node-L">
          <div class="node-circle">L</div>
          <div class="node-label">結構安排導航</div>
        </div>
      </div>
    </div>

    <div class="status" id="statusText">[ANALYZING NODES G-L...]</div>
    <div class="progress-box"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="footer">
    <div>MODULE: INTRODUCTION</div>
    <div>STATUS: ACTIVE</div>
    <div>TYPE: CONTEXT_MAP</div>
    <div>DATE: 2026.05.24</div>
    <div>ENGINEER: [REDACTED]</div>
  </div>
</div>

<script>
  window.applyCustomAnimation = function(tl, durationSecs) {
    gsap.set([".main-frame",".tag",".title",".node-group",".progress-fill"], {clearProps:"all"});
    
    // Intro sequence
    tl.from(".excalidraw-stage", {opacity: 0, duration: 0.5}, 0)
      .from(".main-frame", {scale:.94, opacity:0, duration:.55}, 0.5)
      .from(".tag", {x:-70, opacity:0, duration:.35}, 1.0)
      .from(".title", {y:34, opacity:0, duration:.45}, 1.5)
      .from(".timeline-line", {scaleX:0, transformOrigin:"left center", duration: 0.8}, 2.0);

    // Progress Fill synced to the full duration
    tl.to(".progress-fill", {
      width: "100%", 
      duration: durationSecs, 
      ease: "none"
    }, 0);

    // Dynamic Milestones from storyboard.yml
    const milestones = window.PROGRESS_MILESTONES || [];
    milestones.forEach((m, index) => {
      // Small UI pop at each milestone time
      tl.to(".main-frame", {boxShadow:"0 0 0 6px rgba(142,68,173,.3)", duration:.25}, m.timeSecs)
        .to(".status", {textShadow:"0 0 10px rgba(142,68,173,.65)", scale:1.06, duration:.22}, m.timeSecs)
        .to(".main-frame", {boxShadow:"0 0 0 2px rgba(142,68,173,.18)", duration:.25}, m.timeSecs + 0.5)
        .to(".status", {textShadow:"none", scale:1, duration:.22}, m.timeSecs + 0.5);
        
      // Show nodes based on milestones
      if(m.label === "節點 G") {
        tl.to("#node-G", {opacity: 1, y: 0, duration: 0.5, ease: "back.out(2)"}, m.timeSecs)
          .set("#statusText", {textContent: "[NODE G: MACRO TREND]"}, m.timeSecs);
      }
      if(m.label === "節點 H") {
        tl.to("#node-H", {opacity: 1, y: 0, duration: 0.5, ease: "back.out(2)"}, m.timeSecs)
          .set("#statusText", {textContent: "[NODE H: MICRO CHALLENGE]"}, m.timeSecs);
      }
      if(m.label === "節點 I & J") {
        tl.to("#node-IJ", {opacity: 1, y: 0, duration: 0.5, ease: "back.out(2)"}, m.timeSecs)
          .set("#statusText", {textContent: "[NODE I/J: LITERATURE REVIEW]"}, m.timeSecs);
      }
      if(m.label === "節點 K") {
        tl.to("#node-K", {opacity: 1, y: 0, duration: 0.5, ease: "back.out(2)"}, m.timeSecs)
          .set("#statusText", {textContent: "[NODE K: INNOVATION HIGHLIGHTS]"}, m.timeSecs);
      }
      if(m.label === "節點 L") {
        tl.to("#node-L", {opacity: 1, y: 0, duration: 0.5, ease: "back.out(2)"}, m.timeSecs)
          .set("#statusText", {textContent: "[NODE L: COGNITIVE NAVIGATION MAP]"}, m.timeSecs);
      }
    });
  };
</script>
</body></html>
