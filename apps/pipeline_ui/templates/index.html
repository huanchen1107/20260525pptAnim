<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pipeline UI</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">
          <div class="title">Pipeline UI</div>
          <div class="sub">Step-by-step pipeline + storyboard ideas</div>
        </div>
      </header>

      <section class="card">
        <h2>Project</h2>
        <div class="row">
          <select id="projectSelect"></select>
          <button id="refreshBtn">Refresh</button>
          <label class="meta">Target slide</label>
          <select id="slideSelect"></select>
          <span class="hint">All or single slide</span>
        </div>
        <div class="hint" id="projectHint"></div>
        <div class="stepper" id="stepper"></div>
      </section>

      <section class="card">
        <h2>Step Details</h2>
        <div id="stepTabs" class="step-tabs"></div>
        <div id="stepPanel" class="step-panel"></div>
      </section>

      <section class="card">
        <h2>Slides</h2>
        <div id="slides" class="slides"></div>
      </section>

      <section class="card">
        <h2>Run</h2>
        <div class="row">
          <button id="runFinalBtn">Run Pipeline (final)</button>
          <button id="stepSplitBtn">Split</button>
          <button id="stepConvertBtn">Convert</button>
          <button id="stepStoryboardBtn">Storyboard</button>
          <button id="stepRenderBtn">Render</button>
          <button id="stepCombineBtn">Combine</button>
          <button id="stepValidateBtn">Validate</button>
          <span class="hint" id="runHint"></span>
        </div>
        <pre class="log" id="runLog"></pre>
      </section>
    </main>
    <script src="/static/app.js?v=20260526b"></script>
  </body>
</html>
